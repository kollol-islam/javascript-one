<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Js first project</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="myDIV" class="header">
        <h2>My To Do List</h2>
        <input type="text" id="myInput" placeholder="Title...">
        <span onclick="newElement()" class="addBtn">Add</span>
    </div>
    
    <ul id="myUL">
        <li>Hit the gym</li>
        <li class="checked">Pay bills</li>
        <li>Meet George</li>
        <li>Buy eggs</li>
        <li>Read a book</li>
        <li>Organize office</li>
    </ul>

    <script>
        // Add span and close with javascript
        var myNodelist = document.getElementsByTagName("li");
        var i;
        for (i = 0; i < myNodelist.length; i++) {
            var spanItem = document.createElement("span");
            var closeBtn = document.createTextNode("\u00D7");
            spanItem.className = "close";
            spanItem.appendChild(closeBtn);
            myNodelist[i].appendChild(spanItem);
        }

        // When click close then span display none
        var close = document.getElementsByClassName("close");
        var i;
        for(i = 0; i < close.length; i++) {
            close[i].onclick = function() {
                var spanCut = this.parentElement;
                spanCut.style.display = "none";
            }
        }

        // Add and remove checked class
        var ulLIst = document.querySelector("ul");
        ulLIst.addEventListener('click', function(addRemove) {
            if(addRemove.target.tagName = 'li') {
                addRemove.target.classList.toggle('checked');
            }
        }, false);

        // Click input add and then create li and show
        function newElement() {
            var createLi = document.createElement("li");
            var inputValue = document.getElementById("myInput").value;
            var inputConvertText = document.createTextNode(inputValue);
            createLi.appendChild(inputConvertText);

            if (inputValue === '') {
                alert("You Must Write Something Here..");
            } else {
                document.getElementById("myUL").appendChild(createLi);
            }
            document.getElementById("myInput").value = "";

            // Already made it just copy first One
            var spanItem = document.createElement("span");
            var closeBtn = document.createTextNode("\u00D7");
            spanItem.className = "close";
            spanItem.appendChild(closeBtn);
            myNodelist[i].appendChild(spanItem);

            // Already made it just copy Second One
            for (i = 0; i < close.length; i++) {
                close[i].onclick = function () {
                    var spanCut = this.parentElement;
                    spanCut.style.display = "none";
                }
            }
        }

    </script>
</body>
</html>
